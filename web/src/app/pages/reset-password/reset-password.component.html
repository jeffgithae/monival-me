<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <app-logo size="44px" style="color: var(--primary, #4338ca); margin-bottom: 12px;"></app-logo>
      <p class="eyebrow">Account recovery</p>
      <h1>Reset Password</h1>
      <p>Enter a new password for your account.</p>
    </div>
    @if (success()) {
      <div class="success-message">
        <p style="color: #059669; background: #ecfdf5; padding: 12px; border-radius: 8px; border: 1px solid #10b981; font-weight: 500; font-size: 0.95rem;">
          Your password has been successfully reset.
        </p>
      </div>
      <p class="foot">
        <a routerLink="/login">Sign in</a>
      </p>
    } @else {
      <form (ngSubmit)="submit()">
        <label>New Password</label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="8" />
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="8" />
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button type="submit" [disabled]="loading() || !token">
          {{ loading() ? 'Resetting…' : 'Reset Password' }}
        </button>
      </form>
    }
  </div>
</div>
